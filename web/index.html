<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Talent Mapper — AI人才地图</title>
<style>
:root{--p:#2563eb;--bg:#f8fafc;--c:#fff;--t:#0f172a;--ts:#64748b;--b:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px}
.header{text-align:center;padding:40px 0 24px}
.header h1{font-size:28px;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--ts);margin-top:8px;font-size:15px}

.card{background:var(--c);border-radius:16px;padding:20px 24px;margin-bottom:16px;border:1px solid var(--b);box-shadow:0 1px 2px rgba(0,0,0,.04)}

/* Input area */
.input-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.input-group{flex:1;min-width:180px}
.input-group label{display:block;font-size:13px;font-weight:600;color:var(--ts);margin-bottom:4px}
.input-group input,.input-group select{width:100%;padding:10px 14px;border:1px solid var(--b);border-radius:10px;font-size:15px;outline:none;transition:border .2s}
.input-group input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{padding:10px 24px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--b);color:var(--t)}

/* Progress */
.progress{display:none;margin:16px 0}
.progress.active{display:block}
.progress-bar{height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),#7c3aed);border-radius:3px;transition:width .5s}
.progress-text{font-size:13px;color:var(--ts);margin-top:6px}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--b);padding-bottom:8px}
.tab{padding:8px 16px;border-radius:8px 8px 0 0;cursor:pointer;font-size:14px;font-weight:600;border:none;background:none;color:var(--ts)}
.tab.active{color:var(--p);border-bottom:2px solid var(--p);background:rgba(37,99,235,.05)}

/* Tables */
.table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f1f5f9;padding:8px;text-align:left;font-weight:600;position:sticky;top:0;z-index:1}
td{padding:6px 8px;border-bottom:1px solid var(--b);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:#f8fafc}

/* Report */
.report-frame{width:100%;min-height:400px;border:1px solid var(--b);border-radius:12px;background:#fff}

/* Chat */
.chat{max-height:300px;overflow-y:auto;margin-bottom:12px}
.chat-msg{margin-bottom:10px;padding:8px 12px;border-radius:10px;font-size:14px;max-width:85%}
.chat-user{background:var(--p);color:#fff;margin-left:auto}
.chat-bot{background:#f1f5f9;margin-right:auto}
.chat-input{display:flex;gap:8px}
.chat-input input{flex:1;padding:10px 14px;border:1px solid var(--b);border-radius:10px;font-size:14px}

.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin:1px}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-green{background:#d1fae5;color:#065f46}
.badge-yellow{background:#fef3c7;color:#92400e}

.empty{text-align:center;padding:40px;color:var(--ts);font-size:15px}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>Talent Mapper</h1>
  <p>AI驱动的人才地图生成器 — 输入行业+岗位，一键生成人才画像报告</p>
</div>

<!-- Input -->
<div class="card">
  <div class="input-row">
    <div class="input-group">
      <label>行业</label>
      <input id="industry" placeholder="如: AI大模型、新能源汽车" value="AI大模型">
    </div>
    <div class="input-group">
      <label>岗位</label>
      <input id="role" placeholder="如: AI产品经理、电池研发工程师" value="AI产品经理">
    </div>
    <div class="input-group" style="max-width:120px">
      <label>城市(可选)</label>
      <input id="city" placeholder="北京" value="北京">
    </div>
    <button class="btn btn-primary" id="btnGenerate" onclick="startGenerate()">生成人才地图</button>
  </div>
  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">准备中...</div>
  </div>
</div>

<!-- Results -->
<div class="card" id="resultsCard" style="display:none">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('report')">报告</button>
    <button class="tab" onclick="switchTab('talents')">候选人(<span id="tCount">0</span>)</button>
    <button class="tab" onclick="switchTab('jds')">招聘JD(<span id="jCount">0</span>)</button>
    <button class="tab" onclick="switchTab('chat')">追问</button>
  </div>
  <div id="tab-report"><div id="reportContent" class="report-frame"></div></div>
  <div id="tab-talents" style="display:none"><div class="table-wrap"><table id="talentTable"><thead><tr><th>姓名</th><th>公司</th><th>职位</th><th>城市</th><th>技能</th><th>联系方式</th><th>来源</th></tr></thead><tbody></tbody></table></div></div>
  <div id="tab-jds" style="display:none"><div class="table-wrap"><table id="jdTable"><thead><tr><th>职位</th><th>公司</th><th>薪资</th><th>地点</th><th>经验</th><th>技能</th><th>来源</th></tr></thead><tbody></tbody></table></div></div>
  <div id="tab-chat" style="display:none">
    <div class="chat" id="chatMessages"></div>
    <div class="chat-input"><input id="chatInput" placeholder="追问: 这些人里哪些有海外背景?" onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-primary" onclick="sendChat()">发送</button></div>
  </div>
</div>

<div class="card" id="historyCard">
  <h3 style="margin-bottom:12px">历史报告</h3>
  <div id="historyList" class="empty">加载中...</div>
</div>

</div>

<script>
let currentData = null;

async function startGenerate(){
  const industry=document.getElementById('industry').value.trim();
  const role=document.getElementById('role').value.trim();
  const city=document.getElementById('city').value.trim();
  if(!industry||!role) return alert('请输入行业和岗位');

  document.getElementById('btnGenerate').disabled=true;
  document.getElementById('progress').classList.add('active');
  updateProgress(10,'正在生成目标公司...');

  try{
    const resp=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({industry,role,city})
    });
    updateProgress(70,'正在生成报告...');
    const data=await resp.json();
    updateProgress(100,'完成!');
    currentData=data;
    showResults(data);
    document.getElementById('resultsCard').style.display='';
    loadHistory();
  }catch(e){
    alert('生成失败: '+e.message);
  }
  document.getElementById('progress').classList.remove('active');
  document.getElementById('btnGenerate').disabled=false;
}

function updateProgress(pct,text){
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=text;
}

function showResults(data){
  document.getElementById('tCount').textContent=data.talents?.length||0;
  document.getElementById('jCount').textContent=data.jds?.length||0;
  // Report
  document.getElementById('reportContent').innerHTML=data.report_html||'<div class=empty>报告生成中...</div>';
  // Talent table
  const tbody=document.querySelector('#talentTable tbody');
  tbody.innerHTML='';
  (data.talents||[]).forEach(t=>{
    tbody.innerHTML+=`<tr><td><strong>${t.name||'***'}</strong></td><td>${t.current_company||''}</td><td>${t.current_title||''}</td><td>${t.city||''}</td><td>${(t.skills||'').substring(0,60)}</td><td>${t.contact_type||''}</td><td><span class='badge badge-yellow'>${t.source_platform||''}</span></td></tr>`;
  });
  // JD table
  const jbody=document.querySelector('#jdTable tbody');
  jbody.innerHTML='';
  (data.jds||[]).forEach(j=>{
    jbody.innerHTML+=`<tr><td><strong>${j.title||''}</strong></td><td>${j.company||''}</td><td>${j.salary||''}</td><td>${j.location||''}</td><td>${j.experience||''}</td><td>${(j.skills||'').substring(0,60)}</td><td><span class='badge badge-green'>${j.source_platform||''}</span></td></tr>`;
  });
  switchTab('report');
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['report','talents','jds','chat'][i]===tab);
  });
  ['report','talents','jds','chat'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
  });
}

async function sendChat(){
  const input=document.getElementById('chatInput');
  const q=input.value.trim();
  if(!q||!currentData) return;
  input.value='';
  const msgs=document.getElementById('chatMessages');
  msgs.innerHTML+=`<div class='chat-msg chat-user'>${q}</div>`;
  const resp=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({question:q,context:currentData})
  });
  const data=await resp.json();
  msgs.innerHTML+=`<div class='chat-msg chat-bot'>${data.answer}</div>`;
  msgs.scrollTop=msgs.scrollHeight;
}

async function loadHistory(){
  try{
    const resp=await fetch('/api/data?list=true');
    const data=await resp.json();
    const el=document.getElementById('historyList');
    if(!data.positions?.length){el.innerHTML='<div class=empty>暂无历史报告</div>';return;}
    el.innerHTML=data.positions.map(p=>
      `<div style="padding:8px 0;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center">
        <span>${p.name} · ${p.industry} · ${p.talent_count||0}人/${p.jd_count||0}JD</span>
        <button class="btn btn-secondary" onclick="loadPosition(${p.id})" style="padding:4px 12px;font-size:12px">查看</button>
      </div>`
    ).join('');
  }catch(e){}
}

async function loadPosition(id){
  const resp=await fetch('/api/data?position_id='+id);
  const data=await resp.json();
  currentData=data;
  showResults(data);
  document.getElementById('resultsCard').style.display='';
}
</script>
</body>
</html>
