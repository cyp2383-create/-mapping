<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Talent Mapper</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --p: #6366f1; --p-light: #818cf8; --p-bg: #eef2ff;
  --bg: #fafafa; --c: #fff; --t: #18181b; --ts: #71717a; --t-xs: #a1a1aa;
  --b: #e4e4e7; --r: 12px; --shadow: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--t); line-height: 1.6; -webkit-font-smoothing: antialiased;
}

.hero {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 40%, #a855f7 100%);
  padding: 56px 24px 40px; text-align: center; color: #fff;
}
.hero h1 { font-size: 32px; font-weight: 700; letter-spacing: -.5px; }
.hero p { font-size: 16px; opacity: .85; margin-top: 8px; font-weight: 400; }

.container { max-width: 1024px; margin: 0 auto; padding: 24px; }

.input-card {
  background: var(--c); border-radius: var(--r); padding: 20px 24px;
  box-shadow: var(--shadow); border: 1px solid var(--b); margin-bottom: 20px;
  margin-top: -28px; position: relative; z-index: 2;
}
.input-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.input-group { flex: 1; min-width: 150px; }
.input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--ts); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
.input-group input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--b); border-radius: 8px;
  font-size: 15px; font-family: inherit; outline: none; transition: all .15s;
  background: var(--bg);
}
.input-group input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(99,102,241,.1); background: #fff; }
.btn {
  padding: 10px 20px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .15s; font-family: inherit; white-space: nowrap;
}
.btn-primary { background: var(--p); color: #fff; }
.btn-primary:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.3); }
.btn-primary:disabled { opacity: .5; transform: none; box-shadow: none; cursor: not-allowed; }
.btn-ghost { background: none; color: var(--ts); border: 1px solid var(--b); font-size:12px; padding:4px 12px; border-radius:6px; }
.btn-ghost:hover { background: var(--bg); }

.progress { display: none; margin-top: 12px; }
.progress.active { display: block; }
.progress-bar { height: 4px; background: var(--b); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,var(--p),var(--p-light)); border-radius: 2px; transition: width .4s ease; }
.progress-text { font-size: 12px; color: var(--ts); margin-top: 6px; }

.section {
  background: var(--c); border-radius: var(--r); box-shadow: var(--shadow);
  border: 1px solid var(--b); margin-bottom: 20px; overflow: hidden;
}

.tabs { display: flex; border-bottom: 1px solid var(--b); background: var(--bg); padding: 0 4px; }
.tab {
  padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
  border: none; background: none; color: var(--ts); transition: all .15s;
  font-family: inherit; border-bottom: 2px solid transparent;
}
.tab:hover { color: var(--t); }
.tab.active { color: var(--p); border-bottom-color: var(--p); }

.tab-content { display: none; padding: 20px 24px; }
.tab-content.active { display: block; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; padding: 20px 24px; }
.stat-card { background: var(--bg); border-radius: 8px; padding: 16px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: var(--p); line-height: 1; }
.stat-lbl { font-size: 12px; color: var(--ts); margin-top: 4px; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th {
  background: var(--bg); padding: 10px 12px; text-align: left; font-weight: 600;
  color: var(--ts); text-transform: uppercase; font-size: 11px; letter-spacing: .3px;
  border-bottom: 1px solid var(--b); position: sticky; top: 0; z-index: 1;
}
td { padding: 10px 12px; border-bottom: 1px solid var(--b); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--p-bg); }

.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-yellow { background: #fef3c7; color: #92400e; }
.badge-purple { background: #ede9fe; color: #5b21b6; }

.report-frame { min-height: 400px; background: #fff; }

.chat-panel { max-height: 360px; overflow-y: auto; padding: 4px 0; }
.chat-msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 10px; font-size: 14px; max-width: 85%; line-height: 1.5; }
.chat-user { background: var(--p); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
.chat-bot { background: var(--bg); border: 1px solid var(--b); margin-right: auto; border-bottom-left-radius: 4px; }
.chat-input-row { display: flex; gap: 8px; margin-top: 12px; }
.chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--b); border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
.chat-input-row input:focus { border-color: var(--p); }

.history-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--b); }
.history-item:last-child { border-bottom: none; }
.history-meta { font-size: 12px; color: var(--ts); }

.empty { text-align: center; padding: 40px; color: var(--t-xs); font-size: 14px; }
.footer { text-align: center; padding: 32px; color: var(--t-xs); font-size: 12px; }

@media (max-width: 640px) {
  .hero { padding: 40px 16px 28px; }
  .hero h1 { font-size: 24px; }
  .input-row { flex-direction: column; }
  .input-group { min-width: 100%; }
  .btn { width: 100%; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>Talent Mapper</h1>
  <p>AI驱动的人才地图 · 输入行业+岗位，一键生成人才画像报告</p>
</div>

<div class="container">

<div class="input-card">
  <div class="input-row">
    <div class="input-group"><label>行业</label><input id="industry" placeholder="AI大模型" value="AI大模型"></div>
    <div class="input-group"><label>岗位</label><input id="role" placeholder="AI产品经理" value="AI产品经理"></div>
    <div class="input-group" style="max-width:120px"><label>城市(可选)</label><input id="city" placeholder="北京"></div>
    <button class="btn btn-primary" id="btnGen" onclick="startGenerate()">生成人才地图</button>
  </div>
  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">准备中...</div>
  </div>
</div>

<div class="section" id="results" style="display:none">
  <div class="stats" id="statsRow"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('report')">报告</button>
    <button class="tab" onclick="switchTab('talents')">候选人</button>
    <button class="tab" onclick="switchTab('jds')">招聘JD</button>
    <button class="tab" onclick="switchTab('chat')">追问</button>
  </div>
  <div class="tab-content active" id="tab-report"><div class="report-frame" id="reportContent"></div></div>
  <div class="tab-content" id="tab-talents">
    <div class="table-wrap"><table id="talentTable"><thead><tr><th>姓名</th><th>公司</th><th>职位</th><th>技能</th><th>联系</th><th>来源</th></tr></thead><tbody></tbody></table></div>
  </div>
  <div class="tab-content" id="tab-jds">
    <div class="table-wrap"><table id="jdTable"><thead><tr><th>职位</th><th>公司</th><th>薪资</th><th>地点</th><th>经验</th><th>技能</th><th>来源</th></tr></thead><tbody></tbody></table></div>
  </div>
  <div class="tab-content" id="tab-chat">
    <div class="chat-panel" id="chatMessages"></div>
    <div class="chat-input-row">
      <input id="chatInput" placeholder="追问: 这些人里哪些有海外背景?" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn btn-primary" onclick="sendChat()">发送</button>
    </div>
  </div>
</div>

<div class="section" id="historyCard">
  <div style="padding:16px 24px;border-bottom:1px solid var(--b)"><span style="font-size:14px;font-weight:600">历史报告</span></div>
  <div style="padding:0 24px" id="historyList"><div class="empty">加载中...</div></div>
</div>

<div class="footer">数据来源: Tavily · LinkedIn · GitHub · DeepSeek · 每条数据标注来源</div>

</div>

<script>
let currentData = null;

async function startGenerate(){
  const industry=document.getElementById('industry').value.trim();
  const role=document.getElementById('role').value.trim();
  if(!industry||!role) return;

  const btn=document.getElementById('btnGen'); btn.disabled=true;
  const prog=document.getElementById('progress'); prog.classList.add('active');
  updateProgress(15,'正在生成目标公司...');

  try{
    updateProgress(40,'正在搜索JD和候选人...');
    const resp=await fetch('/api/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({industry,role,city:document.getElementById('city').value.trim()})
    });
    updateProgress(80,'正在生成报告...');
    const data=await resp.json();
    if(data.error){ alert(data.error); return; }
    updateProgress(100,'完成');
    currentData=data;
    showResults(data);
  }catch(e){ alert('生成失败，请重试。'); }
  setTimeout(()=>{ prog.classList.remove('active'); btn.disabled=false; },500);
}

function updateProgress(pct,text){
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=text;
}

function showResults(data){
  document.getElementById('results').style.display='';
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-num">${data.talents?.length||0}</div><div class="stat-lbl">候选人</div></div>
    <div class="stat-card"><div class="stat-num">${data.jds?.length||0}</div><div class="stat-lbl">招聘JD</div></div>
    <div class="stat-card"><div class="stat-num">${data.companies?.length||0}</div><div class="stat-lbl">目标公司</div></div>
  `;
  document.getElementById('reportContent').innerHTML=data.report_html||'<div class="empty">报告生成中...</div>';
  const tbody=document.querySelector('#talentTable tbody'); tbody.innerHTML='';
  (data.talents||[]).forEach(t=>{
    tbody.innerHTML+=`<tr><td><strong>${t.name||'***'}</strong></td><td>${t.current_company||''}</td><td>${t.current_title||''}</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.skills||''}</td><td>${t.contact_type||''}</td><td><span class="badge badge-yellow">${t.source_platform||''}</span></td></tr>`;
  });
  const jbody=document.querySelector('#jdTable tbody'); jbody.innerHTML='';
  (data.jds||[]).forEach(j=>{
    jbody.innerHTML+=`<tr><td><strong>${j.title||''}</strong></td><td>${j.company||''}</td><td>${j.salary||''}</td><td>${j.location||''}</td><td>${j.experience||''}</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${j.skills||''}</td><td><span class="badge badge-green">${j.source_platform||''}</span></td></tr>`;
  });
  switchTab('report');
  loadHistory();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['report','talents','jds','chat'][i]===tab);
  });
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

async function sendChat(){
  const input=document.getElementById('chatInput'); const q=input.value.trim();
  if(!q||!currentData) return; input.value='';
  const msgs=document.getElementById('chatMessages');
  msgs.innerHTML+=`<div class="chat-msg chat-user">${q}</div>`;
  try{
    const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,context:currentData})});
    const d=await resp.json();
    msgs.innerHTML+=`<div class="chat-msg chat-bot">${d.answer||d.error}</div>`;
  }catch(e){ msgs.innerHTML+=`<div class="chat-msg chat-bot">抱歉，暂时不可用。</div>`; }
  msgs.scrollTop=msgs.scrollHeight;
}

async function loadHistory(){
  try{
    const resp=await fetch('/api/data?list=true'); const d=await resp.json();
    const el=document.getElementById('historyList');
    const positions=d.positions||[];
    if(!positions.length){ el.innerHTML='<div class="empty">暂无历史报告</div>'; return; }
    el.innerHTML=positions.map(p=>`<div class="history-item"><div><span style="font-weight:600">${p.name||'#'+p.id}</span><span class="history-meta" style="margin-left:8px">${p.industry||''}</span></div><button class="btn btn-ghost" onclick="loadPosition(${p.id})">查看</button></div>`).join('');
  }catch(e){}
}

async function loadPosition(id){
  const resp=await fetch('/api/data?position_id='+id); const data=await resp.json();
  currentData=data; showResults(data); document.getElementById('results').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
